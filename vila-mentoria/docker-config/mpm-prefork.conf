# Apache MPM Prefork: poucos workers para OPcache aquecer rapidamente
# Com 1-2 workers, OPcache fica quente depois da 1a request e permanece quente
<IfModule mpm_prefork_module>
    StartServers             2
    MinSpareServers          2
    MaxSpareServers          4
    MaxRequestWorkers        25
    MaxConnectionsPerChild   0
</IfModule>
