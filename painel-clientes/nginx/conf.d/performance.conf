gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_proxied      any;
gzip_comp_level   5;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

fastcgi_buffers        16 16k;
fastcgi_buffer_size    32k;
fastcgi_read_timeout   60s;
